<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">
    <div class="signup-container">
        <div class="signup-header">
            <h1 class="signup-title">Create an account</h1>
            <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
        </div>
        <form class="signup-form" action="#" method="post">
            <div class="form-group-2">
                <div class="form-group">
                    <label for="FirstName">First Name</label>
                    <input type="text" id="FirstName" FirstName="FirstName" placeholder="Enter your FirstName" required>
                </div>
                <div class="form-group">
                    <label for="LastName">Last Name</label>
                    <input type="text" id="LastName" LastName="LastName" placeholder="Enter your LastName" required>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">What's your contact number?</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your contact number" required>
            </div>
            <div class="form-group">
                <label for="email">What's your email?</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>
            <div class="form-group">
                <label for="password">Create a password</label>
                <div class="password-group">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <div class="password-toggle">
                        <img src="assets/icons/eye-off.svg">
                        <span>Hide</span>
                    </div>
                </div>
                <p class="password-hint">Use 8 or more characters with a mix of letters, numbers & symbols</p>
            </div>
            <div class="form-group">
                <p class="terms">
                    By creating an account, you agree to the <a href="./terms.html">Terms of use</a> and <a href="./privacy.html">Privacy Policy</a>.
                </p>
                <button type="submit" class="signup-button">Create an account</button>
            </div>
        </form>
    </div>
</body>
</html>
